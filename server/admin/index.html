<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — NEEV Academy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Anton&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #F0F3F9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Ambient background */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            pointer-events: none;
        }
        body::before {
            top: -15%;
            left: -5%;
            width: 500px;
            height: 500px;
            background: rgba(26,58,122,0.08);
            animation: float1 15s ease-in-out infinite alternate;
        }
        body::after {
            bottom: -15%;
            right: -5%;
            width: 450px;
            height: 450px;
            background: rgba(201,168,76,0.06);
            animation: float2 18s ease-in-out infinite alternate;
        }
        @keyframes float1 { from { transform: translate(0,0); } to { transform: translate(30px,40px); } }
        @keyframes float2 { from { transform: translate(0,0); } to { transform: translate(-40px,-30px); } }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        .brand {
            text-align: center;
            margin-bottom: 52px;
        }
        .brand-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: #0A1628;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(10,22,40,0.15);
        }
        .brand-logo h1 {
            font-family: 'Anton', sans-serif;
            font-size: 28px;
            font-weight: 400;
            color: #C9A84C;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .brand h2 {
            font-family: 'Anton', sans-serif;
            font-size: 36px;
            font-weight: 400;
            color: #0A1628;
            letter-spacing: 6px;
            text-transform: uppercase;
        }
        .brand p {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px;
            color: #6B7B8D;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 600;
            margin-top: 4px;
        }

        .login-card {
            background: #FFFFFF;
            border: 1px solid rgba(10,22,40,0.06);
            border-radius: 24px;
            padding: 52px 44px;
            box-shadow: 0 2px 20px rgba(10,22,40,0.06);
            position: relative;
            overflow: hidden;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #1A3A7A, #2B54A8, #C9A84C);
        }

        .login-card h3 {
            font-family: 'Anton', sans-serif;
            color: #0A1628;
            font-size: 24px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        .login-card .subtitle {
            font-family: 'Space Grotesk', sans-serif;
            color: #6B7B8D;
            font-size: 13px;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }

        .form-group { margin-bottom: 28px; }
        .form-group label {
            display: block;
            font-family: 'Space Grotesk', sans-serif;
            color: #1A3A7A;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .input-wrap { position: relative; }
        .input-wrap i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #9AABB8;
            font-size: 14px;
            transition: color 0.3s;
        }
        .input-wrap input {
            width: 100%;
            padding: 18px 20px 18px 50px;
            background: #F0F3F9;
            border: 1px solid rgba(10,22,40,0.06);
            border-radius: 14px;
            color: #0A1628;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            transition: all 0.3s;
        }
        .input-wrap input:focus {
            border-color: #1A3A7A;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(26,58,122,0.08);
        }
        .input-wrap input:focus ~ i { color: #1A3A7A; }
        .input-wrap input::placeholder { color: #9AABB8; }

        .login-btn {
            width: 100%;
            padding: 18px;
            background: #1A3A7A;
            color: #fff;
            border: none;
            border-radius: 14px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
            box-shadow: 0 8px 24px rgba(26,58,122,0.2);
        }
        .login-btn:hover {
            background: #12285A;
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(26,58,122,0.3);
        }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .error-msg {
            background: rgba(239,68,68,0.06);
            border: 1px solid rgba(239,68,68,0.12);
            color: #dc2626;
            padding: 14px 18px;
            border-radius: 14px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            margin-bottom: 24px;
            display: none;
            align-items: center;
            gap: 10px;
        }
        .error-msg.show { display: flex; }

        .footer-text {
            text-align: center;
            font-family: 'Space Grotesk', sans-serif;
            color: #9AABB8;
            font-size: 11px;
            margin-top: 36px;
            letter-spacing: 1px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="brand">
            <div class="brand-logo"><h1>N</h1></div>
            <h2>NEEV</h2>
            <p>Thread of Wisdom</p>
        </div>

        <div class="login-card">
            <h3>Admin Panel</h3>
            <p class="subtitle">Sign in to manage your academy</p>

            <div class="error-msg" id="errorMsg">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="errorText">Invalid credentials</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrap">
                        <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <span>Sign In</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>
        </div>

        <p class="footer-text">NEEV Academy &copy; 2026 — Admin Access Only</p>
    </div>

    <script>
        if (localStorage.getItem('neev_admin_token')) {
            window.location.href = '/admin/dashboard.html';
        }

        const form = document.getElementById('loginForm');
        const btn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.remove('show');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch spinner"></i> Signing in...';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const data = await res.json();

                if (res.ok && data.token) {
                    localStorage.setItem('neev_admin_token', data.token);
                    window.location.href = '/admin/dashboard.html';
                } else {
                    errorText.textContent = data.error || 'Invalid credentials';
                    errorMsg.classList.add('show');
                }
            } catch (err) {
                errorText.textContent = 'Server not reachable. Please try again.';
                errorMsg.classList.add('show');
            }

            btn.disabled = false;
            btn.innerHTML = '<span>Sign In</span><i class="fa-solid fa-arrow-right"></i>';
        });
    </script>
</body>
</html>
